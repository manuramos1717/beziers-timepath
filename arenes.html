<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
  />

  <title>Construction des Arènes de Nîmes</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        linear-gradient(rgba(20, 12, 7, 0.72), rgba(20, 12, 7, 0.88)),
        url("https://img.youtube.com/vi/LJQP06DXipw/maxresdefault.jpg")
        center / cover no-repeat;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .redirect-card {
      width: min(520px, 100%);
      padding: 32px 24px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      background: rgba(15, 10, 7, 0.72);
      backdrop-filter: blur(8px);
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    .redirect-card h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.05;
    }

    .redirect-card p {
      margin: 10px 0;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.9);
    }

    .redirect-card .small {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
    }

    .youtube-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 20px;
      padding: 0 24px;
      border-radius: 999px;
      background: #ff0033;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(255, 0, 51, 0.28);
    }

    .youtube-button:active {
      transform: scale(0.98);
    }

    .brand {
      margin-top: 22px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
    }

    .portal-logo {
      display: block;
      width: 110px;
      height: 110px;
      margin: 16px auto 0;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      padding: 8px;
      box-sizing: border-box;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>

<body>
  <main class="redirect-card">

    <h1>Construction des Arènes de Nîmes</h1>

    <p>
      Cette vidéo est désormais disponible sur la chaîne YouTube
      Portal Temporis.
    </p>

    <p class="small">
      Découvrez en timelapse les différentes étapes de la construction
      de l’amphithéâtre romain de Nîmes.
    </p>

    <a
      class="youtube-button"
      href="https://www.youtube.com/watch?v=LJQP06DXipw"
      target="_blank"
      rel="noopener noreferrer"
    >
      Voir la vidéo sur YouTube
    </a>

    <div class="brand">Portal Temporis</div>

    <img
      class="portal-logo"
      src="logo-portal-temporis.png"
      alt="Logo Portal Temporis"
    />

  </main>
</body>
</html>
