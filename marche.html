  <link rel="stylesheet" href="style.css" />

    body {
      width: 100%;
      height: 100%;

      position: fixed;

      height: 100%;
      border: 0;

<body class="page-360">
  <main class="youtube-360-wrapper">
    <iframe
      src="https://www.youtube.com/embed/HTOLs91MOc8?rel=0"
      title="Marché antique de Béziers — Vidéo 360°"

</body>
